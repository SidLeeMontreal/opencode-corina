name: eval-tier1

on:
  pull_request:
    branches: [main]

jobs:
  eval-tier1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Corina
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Corina deps
        run: npm ci

      - name: Build Corina
        run: npm run build

      - name: Run Tier 1 eval
        run: npm run eval:tier1
